name: allegro
description: "Allegro — administración del glamping (app interna)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado y navegación
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Red
  dio: ^5.7.0

  # Formato de fechas y moneda
  intl: ^0.20.2

  # Calendario
  table_calendar: ^3.1.2

  # Compartir / WhatsApp nativo
  share_plus: ^10.0.2
  url_launcher: ^6.3.0

  # Persistencia local de preferencias (token dev, tema)
  shared_preferences: ^2.3.2

  # Autenticación (Firebase). En modo local no se inicializa.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # Logo vectorial dentro de la app
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf

# Ícono de la app (Android/iOS) generado desde el logo.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#F2F5EE"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  remove_alpha_ios: true
  background_color_ios: "#F2F5EE"

# Pantalla de inicio (splash) nativa.
flutter_native_splash:
  color: "#F2F5EE"
  image: "assets/icon_foreground.png"
  android_12:
    color: "#F2F5EE"
    image: "assets/icon_foreground.png"
