server {
    listen 80;
    listen [::]:80;
    server_name admin.allegro.juanariasdev.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.allegro.juanariasdev.com;

    ssl_certificate     /etc/letsencrypt/live/admin.allegro.juanariasdev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.allegro.juanariasdev.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        resolver 127.0.0.11 valid=30s;
        set $allegro_admin_upstream allegro-admin;
        proxy_pass http://$allegro_admin_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
