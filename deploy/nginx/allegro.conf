# =============================================================================
# Allegro — server blocks de Nginx (PLANTILLA / referencia versionada)
#
# Contiene ÚNICAMENTE los bloques de Allegro. NO es el nginx.conf compartido del
# servidor ni debe reemplazarlo automáticamente: inclúyela como sitio individual
# (p. ej. /etc/nginx/conf.d/allegro.conf) y valida con `nginx -t` antes de
# recargar. Nginx se administra fuera del workflow de la aplicación.
#
# Requisitos: Nginx corre como contenedor conectado a la red `allegro_ingress`
# (por eso puede resolver `allegro-api` vía el DNS interno de Docker 127.0.0.11).
# =============================================================================

# ---- HTTP: reto ACME + redirección a HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name allegro.juanariasdev.com;

    # Reto ACME de Let's Encrypt (certbot --webroot). Ajusta el root al webroot
    # real del servidor si difiere.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: proxy hacia allegro-api:8080 ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name allegro.juanariasdev.com;

    ssl_certificate     /etc/letsencrypt/live/allegro.juanariasdev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/allegro.juanariasdev.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:AllegroSSL:5m;
    ssl_session_timeout 1h;

    # Permite renovaciones ACME también por HTTPS.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        # Resolución DINÁMICA: la IP del contenedor allegro-api cambia tras cada
        # despliegue, por eso se resuelve en cada petición vía el DNS de Docker.
        resolver 127.0.0.11 valid=30s;
        set $allegro_upstream allegro-api;
        proxy_pass http://$allegro_upstream:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
