<h2 mat-dialog-title>{{ isEdit ? 'Editar categoría' : 'Nueva categoría' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="form">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Orden</mat-label>
      <input matInput type="number" formControlName="displayOrder" min="0" />
    </mat-form-field>

    <mat-slide-toggle formControlName="isActive">Activa</mat-slide-toggle>

    @if (error()) {
      <div class="form__error">{{ error() }}</div>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="save()" [disabled]="saving()">Guardar</button>
</mat-dialog-actions>
