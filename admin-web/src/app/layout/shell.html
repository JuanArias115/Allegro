<mat-sidenav-container class="shell">
  <mat-sidenav
    #sidenav
    class="shell__nav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
    [fixedInViewport]="isHandset()"
  >
    <div class="brand">
      <span class="brand__dot"></span>
      <span class="brand__name">Allegro</span>
      <span class="brand__sub">Admin</span>
    </div>

    <mat-nav-list>
      @for (item of items(); track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive
          #rla="routerLinkActive"
          [activated]="rla.isActive"
          (click)="isHandset() && sidenav.close()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <mat-toolbar class="topbar">
      @if (isHandset()) {
        <button mat-icon-button aria-label="Menú" (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="topbar__spacer"></span>

      <button mat-button [matMenuTriggerFor]="userMenu" class="userbtn">
        <span class="avatar">{{ initials() }}</span>
        <span class="userbtn__name">{{ user()?.name || user()?.email }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="usercard">
          <div class="usercard__name">{{ user()?.name || 'Sin nombre' }}</div>
          <div class="usercard__email">{{ user()?.email }}</div>
          <div class="usercard__role">{{ isAdmin() ? 'Administrador' : 'Operador' }}</div>
        </div>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <main class="shell__main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
