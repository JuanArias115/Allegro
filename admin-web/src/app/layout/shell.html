<mat-sidenav-container class="shell">
  <mat-sidenav
    #sidenav
    class="shell__nav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
    [fixedInViewport]="isHandset()"
  >
    <div class="brand">
      <img class="brand__logo" src="brand/logo.svg" alt="Allegro" />
      <div class="brand__text">
        <span class="brand__name">Allegro</span>
        <span class="brand__sub">Administración</span>
      </div>
    </div>

    <mat-nav-list>
      @for (item of items(); track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive
          #rla="routerLinkActive"
          [activated]="rla.isActive"
          (click)="isHandset() && sidenav.close()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <mat-toolbar class="topbar">
      @if (isHandset()) {
        <button mat-icon-button aria-label="Menú" (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="topbar__spacer"></span>

      <button
        class="profile"
        [matMenuTriggerFor]="userMenu"
        aria-label="Cuenta de usuario"
      >
        <span class="profile__avatar">
          @if (user()?.photoURL) {
            <img [src]="user()!.photoURL" alt="" referrerpolicy="no-referrer" />
          } @else {
            {{ initials() }}
          }
        </span>
        <span class="profile__info">
          <span class="profile__name">{{ user()?.name || user()?.email }}</span>
          <span class="profile__role">{{ roleLabel() }}</span>
        </span>
        <mat-icon class="profile__chevron">expand_more</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu" class="user-menu">
        <div class="usercard">
          <div class="usercard__name">{{ user()?.name || 'Sin nombre' }}</div>
          <div class="usercard__email">{{ user()?.email }}</div>
          <div class="usercard__role">{{ roleLabel() }}</div>
        </div>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <main class="shell__main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
