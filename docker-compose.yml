services:
  db:
    image: postgres:16-alpine
    container_name: allegro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-allegro}
      POSTGRES_USER: ${POSTGRES_USER:-allegro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-allegro} -d ${POSTGRES_DB:-allegro}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allegro-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${ConnectionStrings__Default:-Host=db;Port=5432;Database=allegro;Username=allegro;Password=change_me_local_only}
      APPLY_MIGRATIONS: ${APPLY_MIGRATIONS:-true}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      AUTH_MODE: ${AUTH_MODE:-local}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      LOCAL_DEV_TOKEN: ${LOCAL_DEV_TOKEN:-allegro-dev-token}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
