name: deploy

on:
  push:
    branches: [main]
    # Solo lo que afecta a la app desplegada. Cambios de Flutter, de la plantilla
    # de Nginx o de documentación NO redesplegan el backend.
    paths:
      - 'backend/**'
      - 'deploy/docker-compose.production.yml'
      - 'deploy/deploy.sh'
      - 'deploy/rollback.sh'
  workflow_dispatch:

# Permisos mínimos: leer el repo y publicar la imagen en GHCR.
permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/juanarias115/allegro-api

jobs:
  # 1) Pruebas .NET (gate del despliegue).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore backend/Allegro.sln
      - run: dotnet build backend/Allegro.sln -c Release --no-restore
      - run: dotnet test backend/Allegro.sln -c Release --no-build --verbosity normal

  # 2) Construir y publicar la imagen en GHCR (latest + SHA).
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Tag corto (SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) Desplegar por SSH en /opt/allegro y esperar /health/ready.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copiar archivos de despliegue a /opt/allegro
        run: |
          scp -i ~/.ssh/id_deploy -P "${{ secrets.DEPLOY_PORT }}" \
            deploy/docker-compose.production.yml deploy/deploy.sh deploy/rollback.sh \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/allegro/"

      - name: Desplegar y esperar health
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "set -e; \
             echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin; \
             cd /opt/allegro; \
             chmod +x deploy.sh rollback.sh; \
             bash deploy.sh '${{ needs.build-and-push.outputs.tag }}'"
