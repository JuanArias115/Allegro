name: deploy-admin

on:
  push:
    branches: [main]
    paths:
      - 'admin-web/**'
      - 'deploy/docker-compose.admin.yml'
      - 'deploy/deploy-admin.sh'
      - 'deploy/rollback-admin.sh'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-admin-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/juanarias115/allegro-admin

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-web/package-lock.json
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: admin-web
          file: admin-web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
      - name: Copiar definición de despliegue
        run: |
          scp -i ~/.ssh/id_deploy -P "${{ secrets.DEPLOY_PORT }}" \
            deploy/docker-compose.admin.yml deploy/deploy-admin.sh deploy/rollback-admin.sh \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/allegro/"
      - name: Desplegar y comprobar salud
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "set -e; \
             echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin; \
             cd /opt/allegro; \
             chmod +x deploy-admin.sh rollback-admin.sh; \
             bash deploy-admin.sh '${{ needs.build-and-push.outputs.tag }}'"
