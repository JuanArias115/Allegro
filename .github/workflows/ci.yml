name: ci

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'mobile/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar
        run: dotnet restore backend/Allegro.sln

      - name: Compilar
        run: dotnet build backend/Allegro.sln -c Release --no-restore

      - name: Pruebas
        run: dotnet test backend/Allegro.sln -c Release --no-build --verbosity normal

  flutter-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v5

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Dependencias
        run: flutter pub get

      - name: Análisis estático
        run: flutter analyze

      - name: Pruebas
        run: flutter test
